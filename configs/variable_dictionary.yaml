variables:
  # ========== 执行控制模块 ==========
  - raw_tag: "SP001"
    standard_name: "setpoint_temperature"
    chinese_name: "温度设定值"
    unit: "°C"
    module: "execution_control"
    device: "furnace_main"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "主炉温度设定"

  - raw_tag: "SP002"
    standard_name: "setpoint_pressure"
    chinese_name: "压力设定值"
    unit: "MPa"
    module: "execution_control"
    device: "furnace_main"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "主炉压力设定"

  - raw_tag: "CMD001"
    standard_name: "control_mode"
    chinese_name: "控制模式"
    unit: "-"
    module: "execution_control"
    device: "furnace_main"
    data_type: "int"
    sampling_rate: "1s"
    enabled: true
    usage: "0=手动,1=自动,2=串级"

  - raw_tag: "VLV001"
    standard_name: "valve_position_main"
    chinese_name: "主阀阀位"
    unit: "%"
    module: "execution_control"
    device: "valve_main"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "主调节阀开度"

  - raw_tag: "VLV002"
    standard_name: "valve_position_cooling"
    chinese_name: "冷却阀阀位"
    unit: "%"
    module: "execution_control"
    device: "valve_cooling"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "冷却水调节阀开度"

  - raw_tag: "INT001"
    standard_name: "interlock_status"
    chinese_name: "联锁状态"
    unit: "-"
    module: "execution_control"
    device: "safety_system"
    data_type: "int"
    sampling_rate: "1s"
    enabled: true
    usage: "0=正常,1=联锁触发"

  - raw_tag: "FB001"
    standard_name: "actuator_feedback"
    chinese_name: "执行器反馈"
    unit: "%"
    module: "execution_control"
    device: "actuator_main"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "主执行器位置反馈"

  # ========== 能量输入模块 ==========
  - raw_tag: "V001"
    standard_name: "supply_voltage"
    chinese_name: "供电电压"
    unit: "V"
    module: "energy_input"
    device: "power_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "加热系统供电电压"

  - raw_tag: "I001"
    standard_name: "supply_current"
    chinese_name: "供电电流"
    unit: "A"
    module: "energy_input"
    device: "power_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "加热系统供电电流"

  - raw_tag: "P001"
    standard_name: "active_power"
    chinese_name: "有功功率"
    unit: "kW"
    module: "energy_input"
    device: "power_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "加热系统有功功率"

  - raw_tag: "P002"
    standard_name: "reactive_power"
    chinese_name: "无功功率"
    unit: "kVar"
    module: "energy_input"
    device: "power_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "加热系统无功功率"

  - raw_tag: "PF001"
    standard_name: "power_factor"
    chinese_name: "功率因数"
    unit: "-"
    module: "energy_input"
    device: "power_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "功率因数"

  - raw_tag: "E001"
    standard_name: "energy_efficiency"
    chinese_name: "能量利用效率"
    unit: "%"
    module: "energy_input"
    device: "power_system"
    data_type: "float"
    sampling_rate: "10s"
    enabled: true
    usage: "能量利用效率估算"

  - raw_tag: "FREQ001"
    standard_name: "power_frequency"
    chinese_name: "电源频率"
    unit: "Hz"
    module: "energy_input"
    device: "power_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "供电频率"

  # ========== 环境约束模块 ==========
  - raw_tag: "CW001"
    standard_name: "cooling_water_flow"
    chinese_name: "冷却水流量"
    unit: "m³/h"
    module: "environmental_constraint"
    device: "cooling_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "冷却水进水流量"

  - raw_tag: "CW002"
    standard_name: "cooling_water_temp_in"
    chinese_name: "冷却水进水温度"
    unit: "°C"
    module: "environmental_constraint"
    device: "cooling_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "冷却水入口温度"

  - raw_tag: "CW003"
    standard_name: "cooling_water_temp_out"
    chinese_name: "冷却水出水温度"
    unit: "°C"
    module: "environmental_constraint"
    device: "cooling_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "冷却水出口温度"

  - raw_tag: "CW004"
    standard_name: "cooling_water_pressure"
    chinese_name: "冷却水压力"
    unit: "MPa"
    module: "environmental_constraint"
    device: "cooling_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "冷却水系统压力"

  - raw_tag: "VP001"
    standard_name: "vacuum_pressure"
    chinese_name: "真空度"
    unit: "Pa"
    module: "environmental_constraint"
    device: "vacuum_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "炉内真空度"

  - raw_tag: "AP001"
    standard_name: "ambient_pressure"
    chinese_name: "环境气压"
    unit: "kPa"
    module: "environmental_constraint"
    device: "environment"
    data_type: "float"
    sampling_rate: "10s"
    enabled: true
    usage: "环境大气压力"

  - raw_tag: "AH001"
    standard_name: "ambient_humidity"
    chinese_name: "环境湿度"
    unit: "%RH"
    module: "environmental_constraint"
    device: "environment"
    data_type: "float"
    sampling_rate: "10s"
    enabled: true
    usage: "环境相对湿度"

  # ========== 状态维持模块 ==========
  - raw_tag: "T001"
    standard_name: "furnace_temp_1"
    chinese_name: "炉温1区"
    unit: "°C"
    module: "state_maintenance"
    device: "furnace_main"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "炉体1区温度"

  - raw_tag: "T002"
    standard_name: "furnace_temp_2"
    chinese_name: "炉温2区"
    unit: "°C"
    module: "state_maintenance"
    device: "furnace_main"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "炉体2区温度"

  - raw_tag: "T003"
    standard_name: "furnace_temp_3"
    chinese_name: "炉温3区"
    unit: "°C"
    module: "state_maintenance"
    device: "furnace_main"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "炉体3区温度"

  - raw_tag: "PR001"
    standard_name: "furnace_pressure"
    chinese_name: "炉内压力"
    unit: "MPa"
    module: "state_maintenance"
    device: "furnace_main"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "炉内工作压力"

  - raw_tag: "VB001"
    standard_name: "vibration_x"
    chinese_name: "X向振动"
    unit: "mm/s"
    module: "state_maintenance"
    device: "mechanical_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "X方向振动速度"

  - raw_tag: "VB002"
    standard_name: "vibration_y"
    chinese_name: "Y向振动"
    unit: "mm/s"
    module: "state_maintenance"
    device: "mechanical_system"
    data_type: "float"
    sampling_rate: "1s"
    enabled: true
    usage: "Y方向振动速度"

  - raw_tag: "ST001"
    standard_name: "temp_stability_index"
    chinese_name: "温度稳定性指标"
    unit: "-"
    module: "state_maintenance"
    device: "furnace_main"
    data_type: "float"
    sampling_rate: "10s"
    enabled: true
    usage: "温度波动稳定性综合指标"

  - raw_tag: "DEG001"
    standard_name: "degradation_index"
    chinese_name: "退化指标"
    unit: "-"
    module: "state_maintenance"
    device: "furnace_main"
    data_type: "float"
    sampling_rate: "60s"
    enabled: true
    usage: "综合退化趋势指标"
